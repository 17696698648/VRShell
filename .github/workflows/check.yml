name: Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - '.github/workflows/check.yml'
            rust:
              - 'src-tauri/**'
              - '.github/workflows/check.yml'
            tauri:
              - 'frontend/**'
              - 'src-tauri/**'
              - 'package.json'
              - '.github/workflows/check.yml'

  frontend:
    name: Frontend typecheck/test/build
    runs-on: windows-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Audit frontend dependencies
        run: npm run audit:frontend

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(node -p \"require('./frontend/node_modules/@playwright/test/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --prefix frontend playwright install chromium

      - name: E2E smoke
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  rust:
    name: Rust check/test/clippy
    runs-on: windows-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Cache cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit.exe
          key: cargo-audit-${{ runner.os }}-0.21.2

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.21.2 --locked

      - name: Audit Rust dependencies
        run: npm run rust:audit

  tauri-build-smoke:
    name: Tauri build smoke
    runs-on: windows-latest
    needs: [changes, frontend, rust]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.tauri == 'true') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Tauri build smoke
        run: npm run tauri:build
