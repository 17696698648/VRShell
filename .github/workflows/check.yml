name: Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      tauri: ${{ steps.filter.outputs.tauri }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - '.github/workflows/check.yml'
            rust:
              - 'src-tauri/**'
              - 'package.json'
              - '.github/workflows/check.yml'
            tauri:
              - 'frontend/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/check.yml'
            docs:
              - 'README.md'
              - 'docs/**'
              - '.github/workflows/check.yml'

  fast-check:
    name: Fast checks
    runs-on: windows-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.docs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Check generated IPC contract
        run: npm run check:ipc

      - name: Check JSON files
        run: npm run check:json

      - name: Check UTF-8 files
        run: npm run check:utf8

      - name: Check Tauri release security config
        run: npm run check:tauri-release

      - name: UI quality guard
        run: npm --prefix frontend run guard

      - name: Lint frontend
        run: npm run lint

  frontend-test:
    name: Frontend test/build
    runs-on: windows-latest
    needs: [changes, fast-check]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.frontend == 'true') &&
      needs.fast-check.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Audit frontend dependencies
        run: npm run audit:frontend

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

  frontend-linux-test:
    name: Frontend Linux compatibility
    runs-on: ubuntu-latest
    needs: [changes, fast-check]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.frontend == 'true') &&
      needs.fast-check.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

  rust-test:
    name: Rust check/test/clippy
    runs-on: windows-latest
    needs: [changes, fast-check]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.rust == 'true') &&
      needs.fast-check.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Cache cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit.exe
          key: cargo-audit-${{ runner.os }}-0.21.2

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.21.2 --locked

      - name: Audit Rust dependencies
        run: npm run rust:audit

  e2e-smoke:
    name: E2E smoke
    runs-on: windows-latest
    needs: [changes, fast-check, frontend-test]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.frontend == 'true') &&
      needs.fast-check.result == 'success' &&
      needs.frontend-test.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(node -p \"require('./frontend/node_modules/@playwright/test/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --prefix frontend playwright install chromium

      - name: Run E2E smoke
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  e2e-security:
    name: E2E security
    runs-on: windows-latest
    needs: [changes, fast-check, frontend-test]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.tauri == 'true') &&
      needs.fast-check.result == 'success' &&
      needs.frontend-test.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(node -p \"require('./frontend/node_modules/@playwright/test/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --prefix frontend playwright install chromium

      - name: Run E2E security
        run: npm run test:e2e:security

  release-sensitive:
    name: Release-sensitive checks
    runs-on: windows-latest
    needs: [changes, fast-check, frontend-test, rust-test, e2e-security]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.tauri == 'true') &&
      needs.fast-check.result == 'success' &&
      needs.frontend-test.result == 'success' &&
      needs.rust-test.result == 'success' &&
      needs.e2e-security.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Check Tauri release security config
        run: npm run check:tauri-release

  tauri-build-smoke:
    name: Tauri build smoke
    runs-on: windows-latest
    needs: [changes, frontend-test, rust-test]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.tauri == 'true') &&
      needs.frontend-test.result == 'success' &&
      needs.rust-test.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Tauri build smoke
        run: npm run tauri:build
