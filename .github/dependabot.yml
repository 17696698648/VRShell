version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      tauri-runtime:
        patterns:
          - '@tauri-apps/*'
        update-types:
          - minor
          - patch
      terminal-editor-runtime:
        patterns:
          - '@xterm/*'
          - '@codemirror/*'
          - codemirror
        update-types:
          - minor
          - patch
      frontend-minor-patch:
        exclude-patterns:
          - '@tauri-apps/*'
          - '@xterm/*'
          - '@codemirror/*'
          - codemirror
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps(frontend)

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      ssh-security-runtime:
        patterns:
          - ssh2
          - keyring
          - socket2
          - hmac
          - sha1
          - sha2
        update-types:
          - minor
          - patch
      tauri-rust-runtime:
        patterns:
          - tauri
          - tauri-build
          - tauri-plugin-*
        update-types:
          - minor
          - patch
      rust-minor-patch:
        exclude-patterns:
          - ssh2
          - keyring
          - socket2
          - hmac
          - sha1
          - sha2
          - tauri
          - tauri-build
          - tauri-plugin-*
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps(rust)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(ci)
